events { worker_connections 1024; }

http {
  client_max_body_size 20M;

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name clerkai.live www.clerkai.live;
    return 301 https://$host$request_uri;
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name clerkai.live www.clerkai.live;

    ssl_certificate     /etc/letsencrypt/live/clerkai.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clerkai.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Telegram webhook → bot on port 8080
    location /telegram-webhook {
      proxy_pass http://app:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 30s;
    }

    # API → FastAPI on port 8000
    location /api/ {
      proxy_pass http://api:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 120s;
    }

    # Everything else → Next.js on port 3000
    location / {
      proxy_pass http://dashboard:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
    }
  }
}
