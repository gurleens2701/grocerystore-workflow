version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Gas Station Agent — Docker Compose
# Usage: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gasbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gasbot_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasbot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── App (bot + APScheduler) ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: python main.py
    restart: always
    env_file: .env
    environment:
      # Default store; override at deploy time (e.g. STORE_ID=moraine2)
      STORE_ID: moraine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Store configs mounted read-only — credentials never baked into image
      - ./stores:/app/stores:ro
      # Google service account credentials
      - ./config:/app/config:ro
      # Daily report output (writable)
      - ./reports:/app/reports

  # ── Nginx (Phase 2 web dashboard — not active yet) ─────────────────────────
  # Uncomment for Phase 2 web dashboard
  # nginx:
  #   image: nginx:alpine
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - app

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
