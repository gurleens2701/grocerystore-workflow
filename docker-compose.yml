version: "3.9"

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gasbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gasbot_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasbot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Telegram Bot + APScheduler ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: python main.py
    restart: always
    stop_grace_period: 15s
    env_file: .env
    environment:
      STORE_ID: moraine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./stores:/app/stores:ro
      - ./config:/app/config:ro
      - ./reports:/app/reports

  # ── FastAPI Dashboard API ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: always
    env_file: .env
    environment:
      STORE_ID: moraine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./stores:/app/stores:ro
      - ./config:/app/config:ro

  # ── Next.js Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard

volumes:
  postgres_data:
